<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civix – Login</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body class="auth-body">

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-brand">
            <div class="brand-logo">
                <i class="fa-solid fa-building-columns"></i>
            </div>
            <h1 class="brand-name">Civix</h1>
            <p class="brand-tagline">AI-Powered Society Management</p>
        </div>

        <div class="auth-tabs">
            <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Sign In</button>
            <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <form id="loginForm" class="auth-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-user"></i> Username or Email</label>
                <input type="text" id="loginUsername" class="form-input" placeholder="Enter username or email" required>
            </div>
            <div class="form-group">
                <label class="form-label"><i class="fa-solid fa-lock"></i> Password</label>
                <div class="input-password-wrap">
                    <input type="password" id="loginPassword" class="form-input" placeholder="Enter password" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('loginPassword', this)">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            <div id="loginError" class="form-error hidden"></div>
            <button type="submit" class="btn btn-primary btn-full" id="loginBtn">
                <span class="btn-text">Sign In</span>
                <span class="btn-spinner hidden"><i class="fa-solid fa-spinner fa-spin"></i></span>
            </button>
            <div class="auth-demo-creds">
                <p class="demo-label">Demo Credentials</p>
                <div class="demo-creds-grid">
                    <button type="button" class="demo-btn" onclick="fillCreds('admin','Admin@123')">
                        <i class="fa-solid fa-shield-halved"></i> Admin
                    </button>
                    <button type="button" class="demo-btn" onclick="fillCreds('rahul.sharma','Admin@123')">
                        <i class="fa-solid fa-house-user"></i> Resident
                    </button>
                </div>
            </div>
        </form>

        <!-- Register Form -->
        <form id="registerForm" class="auth-form hidden" onsubmit="handleRegister(event)">
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <input type="text" id="regFullName" class="form-input" placeholder="Your full name" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" id="regUsername" class="form-input" placeholder="Choose username" required>
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="regEmail" class="form-input" placeholder="Email address" required>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="tel" id="regPhone" class="form-input" placeholder="10-digit phone" required pattern="[0-9]{10}">
                </div>
                <div class="form-group">
                    <label class="form-label">Unit No.</label>
                    <input type="text" id="regUnit" class="form-input" placeholder="e.g. A-101">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <div class="input-password-wrap">
                    <input type="password" id="regPassword" class="form-input" placeholder="Min 8 chars, upper+lower+digit" required>
                    <button type="button" class="toggle-password" onclick="togglePassword('regPassword', this)">
                        <i class="fa-solid fa-eye"></i>
                    </button>
                </div>
            </div>
            <div id="registerError" class="form-error hidden"></div>
            <button type="submit" class="btn btn-primary btn-full" id="registerBtn">
                <span class="btn-text">Create Account</span>
                <span class="btn-spinner hidden"><i class="fa-solid fa-spinner fa-spin"></i></span>
            </button>
        </form>
    </div>

    <div class="auth-features">
        <div class="feature-item"><i class="fa-solid fa-robot"></i><span>AI-Powered Complaint Analysis</span></div>
        <div class="feature-item"><i class="fa-solid fa-shield-halved"></i><span>JWT Secured Platform</span></div>
        <div class="feature-item"><i class="fa-solid fa-chart-line"></i><span>Real-time Analytics</span></div>
        <div class="feature-item"><i class="fa-solid fa-bell"></i><span>Instant Notifications</span></div>
    </div>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
